<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Auth</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f0f0f;
  font-family:Arial;
  color:white;
}

.box {
  background:#181818;
  padding:30px;
  border-radius:15px;
  width:320px;
  text-align:center;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#5865F2;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.toggle {
  margin-top:10px;
  font-size:12px;
  color:#aaa;
  cursor:pointer;
}
</style>

<script>
function toggleForm(){
  document.getElementById("login").style.display =
    document.getElementById("login").style.display === "none" ? "block" : "none";

  document.getElementById("register").style.display =
    document.getElementById("register").style.display === "none" ? "block" : "none";
}
</script>
</head>

<body>

<div class="box">

<!-- LOGIN -->
<form id="login" action="login.php" method="POST">
  <h2>Iniciar sesión</h2>
  <input type="email" name="email" placeholder="Correo" required>
  <input type="password" name="password" placeholder="Contraseña" required>
  <button>Entrar</button>
</form>

<!-- REGISTER -->
<form id="register" action="register.php" method="POST" style="display:none;">
  <h2>Crear cuenta</h2>
  <input type="text" name="name" placeholder="Nombre">
  <input type="email" name="email" placeholder="Correo" required>
  <input type="password" name="password" placeholder="Contraseña" required>
  <button>Registrarse</button>
</form>

<div class="toggle" onclick="toggleForm()">
  Cambiar Login / Registro
</div>

</div>

</body>
</html>
