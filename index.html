<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .card {
      background: #181818;
      padding: 30px;
      border-radius: 15px;
      width: 320px;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      background: #222;
      color: white;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      background: #2a2a2a;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #45a049;
      transform: scale(1.02);
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #4CAF50;
    }

    .subtitle {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<div class="card">
  <div class="logo">Mi Web</div>
  <div class="subtitle">Crear cuenta</div>

  <form action="register.php" method="POST">
    <input type="text" name="name" placeholder="Nombre (opcional)">
    <input type="email" name="email" placeholder="Gmail" required>
    <input type="password" name="password" placeholder="Contraseña" required>

    <button type="submit">Registrarse</button>
  </form>
</div>

</body>
